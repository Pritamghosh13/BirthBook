<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="log_in_style.css" />
</head>
<body>

  <!-- Animated background blobs -->
  <div class="bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="container">

    <!-- Left panel — branding -->
    <div class="panel panel--left">
      <div class="brand">
        <div class="brand__icon">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 2L28 9V23L16 30L4 23V9L16 2Z" fill="currentColor" opacity="0.15"/>
            <path d="M16 2L28 9V23L16 30L4 23V9L16 2Z" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="16" cy="16" r="4" fill="currentColor"/>
          </svg>
        </div>
        <span class="brand__name">BirthBook</span>
      </div>

      <div class="panel__copy">
        <h1 class="panel__headline">Welcome<br/><em>back.</em></h1>
        <p class="panel__sub">Sign in to continue your journey. Everything you left behind is waiting.</p>
      </div>

      <div class="panel__pills">
        <span class="pill">🔒 Secure</span>
        <span class="pill">⚡ Fast</span>
        <!-- <span class="pill">🌐 Global</span> -->
      </div>
    </div>

    <!-- Right panel — form -->
    <div class="panel panel--right">
      <div class="form-wrap">

        <div class="form-header">
          <h2 class="form-title">Sign In</h2>
          <p class="form-sub">Don't have an account? <a href="registation.html" class="link">Create one →</a></p>
        </div>

        <form id="loginForm" novalidate>

          <!-- Email -->
          <div class="field" id="fieldEmail">
            <label class="field__label" for="email">Email address</label>
            <div class="field__wrap">
              <span class="field__icon">
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="2" y="4" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/>
                  <path d="M2 7l8 5 8-5" stroke="currentColor" stroke-width="1.4"/>
                </svg>
              </span>
              <input
                class="field__input"
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                autocomplete="email"
              />
            </div>
            <span class="field__error" id="emailErr">Please enter a valid email.</span>
          </div>

          <!-- Password -->
          <div class="field" id="fieldPassword">
            <label class="field__label" for="password">Password</label>
            <div class="field__wrap">
              <span class="field__icon">
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="4" y="8" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.4"/>
                  <path d="M7 8V6a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.4"/>
                  <circle cx="10" cy="13" r="1.2" fill="currentColor"/>
                </svg>
              </span>
              <input
                class="field__input"
                type="password"
                id="password"
                name="password"
                placeholder="password"
                autocomplete="current-password"
              />
              <button type="button" class="field__toggle" id="togglePwd" aria-label="Toggle password visibility">
                <svg class="eye-show" viewBox="0 0 20 20" fill="none"><path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.4"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.4"/></svg>
                <svg class="eye-hide" viewBox="0 0 20 20" fill="none" style="display:none"><path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.4"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.4"/><line x1="3" y1="3" x2="17" y2="17" stroke="currentColor" stroke-width="1.4"/></svg>
              </button>
            </div>
            <span class="field__error" id="passwordErr">Password must be at least 6 characters.</span>
          </div>

          <!-- Remember / Forgot -->
          <div class="form-extras">
            <label class="checkbox">
              <input type="checkbox" id="remember"/>
              <span class="checkbox__box"></span>
              <span class="checkbox__label">Remember me</span>
            </label>
            <a href="#" class="link">Forgot password?</a>
          </div>

          <!-- Submit -->
          <button class="btn-submit" type="submit" id="submitBtn">
            <span class="btn-submit__text">Log In</span>
            <span class="btn-submit__loader" aria-hidden="true">
              <span></span><span></span><span></span>
            </span>
            <span class="btn-submit__success" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none"><polyline points="4 12 9 17 20 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
          </button>

        </form>

        <!-- Divider -->
        

        <!-- Social buttons -->
        

      </div>
    </div>

  </main>

 
</body>
<script src="script.js"></script>
</html>
